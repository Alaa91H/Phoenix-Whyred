name: Validate

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Structure & scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler shellcheck || true

      - name: Fix line endings & permissions
        run: |
          sed -i 's/\r$//' scripts/*.sh PROJECT.conf Makefile || true
          chmod +x scripts/*.sh

      - name: Validate project
        run: ./scripts/validate.sh

      - name: ShellCheck (non-fatal style)
        run: |
          if command -v shellcheck >/dev/null; then
            shellcheck -x scripts/validate.sh scripts/ci-env.sh || true
            shellcheck -x scripts/setup.sh scripts/build.sh scripts/pack.sh || true
          fi
