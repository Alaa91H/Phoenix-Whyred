name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_track:
        description: "Kernel track"
        required: true
        default: "7.0"
        type: choice
        options:
          - "7.0"
          - "4.19"
      build_mode:
        description: "Build mode"
        required: true
        default: image
        type: choice
        options:
          - image
          - full
      kernel_419_branch:
        description: "4.19 git branch (only if track=4.19)"
        required: false
        default: stable-release
      create_release:
        description: "Create GitHub Release"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 3 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  CONTINUE_ON_ERROR: "1"
  ARCH: arm64
  SUBARCH: arm64
  LLVM: "1"
  LLVM_IAS: "1"
  CROSS_COMPILE: aarch64-linux-gnu-

jobs:
  build:
    name: whyred · ${{ inputs.kernel_track || github.event.inputs.kernel_track || '7.0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout project
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git make bc bison flex libssl-dev libelf-dev \
            zip unzip rsync python3 device-tree-compiler \
            gcc-aarch64-linux-gnu clang lld llvm \
            libncurses-dev dwarves zstd cpio libdwarf-dev libdw-dev
          for d in /usr/include/libdwarf-0 /usr/include/libdwarf; do
            [ -f "$d/dwarf.h" ] && sudo ln -sf "$d/dwarf.h" /usr/include/dwarf.h
            [ -f "$d/libdwarf.h" ] && sudo ln -sf "$d/libdwarf.h" /usr/include/libdwarf.h
          done

      - name: Fix scripts
        run: |
          sed -i 's/\r$//' scripts/*.sh PROJECT.conf Makefile || true
          chmod +x scripts/*.sh

      - name: Resolve options
        id: opts
        run: |
          TRACK="${{ inputs.kernel_track || github.event.inputs.kernel_track || '7.0' }}"
          MODE="${{ inputs.build_mode || github.event.inputs.build_mode || 'image' }}"
          BRANCH="${{ github.event.inputs.kernel_419_branch || 'stable-release' }}"
          CREL="${{ inputs.create_release || github.event.inputs.create_release || 'false' }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            MODE=full
            CREL=true
            TRACK=7.0
          fi
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "create_release=$CREL" >> "$GITHUB_OUTPUT"
          if [[ "$MODE" == "image" ]]; then
            echo "skip_modules=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip_modules=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup sources
        env:
          KERNEL_TRACK: ${{ steps.opts.outputs.track }}
          KERNEL_419_BRANCH: ${{ steps.opts.outputs.branch }}
        run: ./scripts/setup.sh

      - name: Apply patches
        if: steps.opts.outputs.track == '4.19'
        run: ./scripts/import-whyred-419.sh || true

      - name: Build
        env:
          KERNEL_TRACK: ${{ steps.opts.outputs.track }}
          SKIP_MODULES: ${{ steps.opts.outputs.skip_modules }}
          CONTINUE_ON_ERROR: "1"
          JOBS: "4"
        run: |
          if [[ "${{ steps.opts.outputs.mode }}" == "image" ]]; then
            ./scripts/build.sh image
          else
            ./scripts/build.sh whyred
          fi

      - name: Verify config
        if: success()
        run: |
          echo "==> Verifying critical config symbols..."
          CONF="out/build/.config"
          if [[ ! -f "$CONF" ]]; then
            echo "ERROR: .config not found at $CONF"
            exit 1
          fi
          FAIL=0
          for sym in CONFIG_ARCH_QCOM CONFIG_CMDLINE_DROP_DANGEROUS_ANDROID_OPTIONS \
                     CONFIG_SERIAL_QCOM_GENI CONFIG_MMC_SDHCI_MSM \
                     CONFIG_USB_DWC3_QCOM CONFIG_DRM_MSM CONFIG_SDM_GCC_660; do
            if grep -qE "^${sym}=[my]" "$CONF"; then
              echo "  OK  $sym"
            else
              echo "  MISSING  $sym"
              FAIL=$((FAIL + 1))
            fi
          done
          if [[ $FAIL -gt 0 ]]; then
            echo "ERROR: $FAIL critical config symbols missing"
            exit 1
          fi
          echo "==> Config verification passed"

      - name: Verify DTB
        if: success()
        run: |
          echo "==> Verifying DTB build output..."
          DTB="out/build/arch/arm64/boot/dts/qcom/sdm636-xiaomi-whyred.dtb"
          if [[ -f "$DTB" ]]; then
            echo "  OK  sdm636-xiaomi-whyred.dtb ($(stat -c%s "$DTB") bytes)"
          else
            echo "  WARNING: DTB not found at $DTB"
            echo "  Checking for any DTBs in dts/qcom/..."
            find out/build/arch/arm64/boot/dts/qcom/ -name '*.dtb' 2>/dev/null | head -5 || echo "  No DTBs found"
          fi
          IMG="out/build/arch/arm64/boot/Image.gz"
          if [[ -f "$IMG" ]]; then
            echo "  OK  Image.gz ($(stat -c%s "$IMG") bytes)"
          else
            echo "  WARNING: Image.gz not found"
            find out/build/arch/arm64/boot/ -name 'Image*' 2>/dev/null | head -5 || echo "  No images found"
          fi

      - name: Pack zip
        if: success()
        env:
          KERNEL_TRACK: ${{ steps.opts.outputs.track }}
          FETCH_ANYKERNEL: "1"
        run: ./scripts/pack.sh

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: whyred-${{ steps.opts.outputs.track }}-${{ github.sha }}
          path: |
            out/dist/*.zip
            out/dist/Image*
            out/dist/*.dtb
            out/dist/dtbo.img
            out/dist/config
            out/dist/modules-*.tar.gz
            out/dist/build-info.txt
            out/dist/SHA256SUMS
            out/build-*.log
            vendor/import/**
          if-no-files-found: warn
          retention-days: 14

      - name: Release
        if: success() && (github.ref_type == 'tag' || steps.opts.outputs.create_release == 'true')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || format('ci-{0}', github.run_number) }}"
          name: "Phoenix-Whyred ${{ steps.opts.outputs.track }} ${{ github.ref_type == 'tag' && github.ref_name || format('CI run {0}', github.run_number) }}"
          body: |
            ## Phoenix-Whyred Kernel
            - Track: **${{ steps.opts.outputs.track }}** (sdm660-mainline 7.0.9)
            - Device: whyred (Redmi Note 5 Pro / SDM636)
            - Mode: ${{ steps.opts.outputs.mode }}
            - Commit: `${{ github.sha }}`

            Experimental bring-up. Backup boot before flash.
          files: |
            out/dist/*.zip
            out/dist/Image.gz-dtb
            out/dist/Image.gz
            out/dist/Image
          fail_on_unmatched_files: false
          generate_release_notes: true
