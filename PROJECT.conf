# =============================================================================
# Phoenix-Whyred — Linux 7.0.9 (sdm660-mainline)
# =============================================================================

PROJECT_NAME="phoenix-whyred"
PROJECT_VERSION="1.0.0"

# Device
DEVICE_CODENAME="whyred"
DEVICE_NAME="Xiaomi Redmi Note 5 Pro"
SOC="sdm636"
SOC_FAMILY="sdm660"
ARCH="arm64"
SUBARCH="arm64"

# =============================================================================
# Kernel source — sdm660-mainline 7.0.y
# =============================================================================
KERNEL_TRACK="7.0"
KERNEL_VERSION="7.0.9"
GKI_REMOTE="https://github.com/sdm660-mainline/linux.git"
GKI_BRANCH_REF="qcom-sdm660-7.0.y"
GKI_COMMIT=""
KERNEL_SRC="Phoenix-Whyred-7.0"  # Cloned kernel tree (overlay target)
SRC_DIR="Phoenix-Whyred-7.0"      # Same as KERNEL_SRC

# Build directories
OUT_DIR="out"
BUILD_DIR="out/build"
DIST_DIR="out/dist"
MODULES_OUT="out/modules"

# Config
BASE_DEFCONFIG="sdm660_defconfig"
CONFIG_OVERLAY="configs/fragments/phoenix-whyred.config"
LOCALVERSION="-phoenix-whyred-7.0"
ZIP_PREFIX="Phoenix-Whyred-7.0"

# Config fragments
FRAGMENT_SDM660="configs/fragments/sdm660.config"
FRAGMENT_WHYRED="configs/fragments/whyred.config"
FRAGMENT_LTS="configs/fragments/lts-6.18.config"
FRAGMENT_ANDROID="configs/fragments/android-gki.config"

# Device tree
DTS_DIR="arch/arm64/boot/dts/qcom"
DTB_NAME="sdm636-xiaomi-whyred"

# Build options
JOBS="$(nproc 2>/dev/null || echo 4)"
CC="clang"
LLVM="1"
LLVM_IAS="1"
CROSS_COMPILE="aarch64-linux-gnu-"

# Packing
ANYKERNEL_DIR="pack/AnyKernel3"

# Downstream 4.19 (optional)
KERNEL_419_DIR="Phoenix-Whyred-7.0"
KERNEL_419_REMOTE=""
KERNEL_419_BRANCH="stable-release"
KERNEL_419_DEFCONFIG="whyred_defconfig"

# Fork info
FORK_REPO="https://github.com/Alaa91H/linux.git"
FORK_BRANCH="phoenix-whyred"
