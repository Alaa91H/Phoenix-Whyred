# =============================================================================
# Whyred Hybrid Kernel — Linux 6.18 LTS + Android GKI (android17-6.18)
# Optional: Downstream 4.19 for production ROMs (KERNEL_TRACK=4.19)
# =============================================================================

PROJECT_NAME="whyred-hybrid"
PROJECT_VERSION="0.3.0-dev"

# -----------------------------------------------------------------------------
# Active track: 6.18 (DEFAULT hybrid LTS) | 4.19 (downstream ROM kernel)
# Override: export KERNEL_TRACK=4.19
# -----------------------------------------------------------------------------
KERNEL_TRACK="${KERNEL_TRACK:-6.18}"

# Device
DEVICE_CODENAME="whyred"
DEVICE_NAME="Xiaomi Redmi Note 5 Pro"
SOC="sdm636"
SOC_FAMILY="sdm660"
ARCH="arm64"
SUBARCH="arm64"

# =============================================================================
# Track A — Hybrid 6.18 LTS (DEFAULT)
# Base: Android Common Kernel android17-6.18 (ACK on Linux 6.18 LTS)
# Plus: project DT + drivers/whyred + optional sdm660-mainline reference
# LTS: Linux 6.18 LTS (kernel.org) · Android EOL ~2030-07 for android17-6.18
# =============================================================================
KERNEL_VERSION_GKI="6.18"
ANDROID_RELEASE="android17"
GKI_BRANCH="android17-6.18"
GKI_REMOTE="${GKI_REMOTE:-https://android.googlesource.com/kernel/common}"
GKI_BRANCH_REF="${GKI_BRANCH_REF:-android17-6.18}"
GKI_SRC=".src/common"

# Optional: also fetch pure LTS tree for cherry-picks (linux-6.18.y)
LTS_REMOTE="${LTS_REMOTE:-https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git}"
LTS_BRANCH="${LTS_BRANCH:-linux-6.18.y}"
LTS_DIR=".src/linux-6.18.y"
FETCH_LTS="${FETCH_LTS:-0}"

# SDM660 mainline reference (clocks/DT ideas for hybrid)
SDM660_REMOTE="${SDM660_REMOTE:-https://github.com/sdm660-mainline/linux.git}"
SDM660_BRANCH="${SDM660_BRANCH:-master}"
SDM660_DIR=".src/sdm660-mainline"
# On CI default skip; locally set SKIP_SDM660=0 to clone
SKIP_SDM660="${SKIP_SDM660:-0}"

# =============================================================================
# Track B — Downstream 4.19 (ROM boot today)
# =============================================================================
KERNEL_419_REMOTE="${KERNEL_419_REMOTE:-https://github.com/user-why-red/android_kernel_xiaomi_sdm660_419.git}"
KERNEL_419_BRANCH="${KERNEL_419_BRANCH:-stable-release}"
KERNEL_419_DIR=".src/kernel-4.19"
KERNEL_419_DEFCONFIG="${KERNEL_419_DEFCONFIG:-vendor/whyred-perf_defconfig}"

# =============================================================================
# Resolved paths (depend on KERNEL_TRACK)
# =============================================================================
SRC_DIR=".src"
if [ "${KERNEL_TRACK}" = "4.19" ] || [ "${KERNEL_TRACK}" = "419" ]; then
  KERNEL_VERSION="4.19"
  KERNEL_SRC="${KERNEL_419_DIR}"
  BASE_DEFCONFIG="${KERNEL_419_DEFCONFIG}"
  ZIP_PREFIX="Whyred-4.19"
  LOCALVERSION="-whyred-419-${PROJECT_VERSION}"
else
  # Default and any other value → 6.18 hybrid LTS
  KERNEL_TRACK="6.18"
  KERNEL_VERSION="6.18"
  KERNEL_SRC="${GKI_SRC}"
  BASE_DEFCONFIG="gki_defconfig"
  ZIP_PREFIX="Whyred-Hybrid-6.18-LTS"
  LOCALVERSION="-whyred-hybrid-6.18-lts-${PROJECT_VERSION}"
fi

OUT_DIR="out"
DIST_DIR="out/dist"
MODULES_OUT="out/modules"
BUILD_DIR="out/build"

# Config fragments (6.18 hybrid)
FRAGMENT_ANDROID="configs/fragments/android-gki.config"
FRAGMENT_SDM660="configs/fragments/sdm660.config"
FRAGMENT_WHYRED="configs/fragments/whyred.config"
FRAGMENT_HYBRID="configs/fragments/hybrid.config"
FRAGMENT_LTS="configs/fragments/lts-6.18.config"

# Device tree (project overlay → copied into GKI tree on setup)
DTS_DIR="arch/arm64/boot/dts/qcom"
DTB_NAME="sdm636-xiaomi-whyred"

# Build options
JOBS="$(nproc 2>/dev/null || echo 4)"
CC="clang"
LLVM="1"
LLVM_IAS="1"
CROSS_COMPILE="aarch64-linux-gnu-"

# Packing
ANYKERNEL_DIR="pack/AnyKernel3"
