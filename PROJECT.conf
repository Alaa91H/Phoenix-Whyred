# =============================================================================
# Phoenix-Whyred — Linux Mainline 6.18 LTS
# Optional: Downstream 4.19 for production ROMs (KERNEL_TRACK=4.19)
# =============================================================================

PROJECT_NAME="phoenix-whyred"
PROJECT_VERSION="0.4.0-dev"

# -----------------------------------------------------------------------------
# Active track: 6.18 (DEFAULT — Linux Mainline LTS) | 4.19 (downstream ROM kernel)
# Override: export KERNEL_TRACK=4.19
# -----------------------------------------------------------------------------
KERNEL_TRACK="${KERNEL_TRACK:-6.18}"

# Device
DEVICE_CODENAME="whyred"
DEVICE_NAME="Xiaomi Redmi Note 5 Pro"
SOC="sdm636"
SOC_FAMILY="sdm660"
ARCH="arm64"
SUBARCH="arm64"

# =============================================================================
# Track A — Linux Mainline 6.18 LTS (DEFAULT)
# Base: Linux Mainline 6.18 LTS (kernel.org)
# Plus: project DT + optional drivers/whyred
# Why: SDM660/636 support is upstream (sdm660-mainline merged)
# =============================================================================
KERNEL_VERSION_GKI="6.18"
GKI_BRANCH="v6.18"
GKI_REMOTE="${GKI_REMOTE:-https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git}"
GKI_BRANCH_REF="${GKI_BRANCH_REF:-v6.18}"
GKI_COMMIT="${GKI_COMMIT:-v6.18}"
GKI_SRC=".src/linux-6.18"

# =============================================================================
# Track B — Downstream 4.19 (ROM boot today)
# =============================================================================
KERNEL_419_REMOTE="${KERNEL_419_REMOTE:-https://github.com/user-why-red/android_kernel_xiaomi_sdm660_419.git}"
KERNEL_419_BRANCH="${KERNEL_419_BRANCH:-stable-release}"
KERNEL_419_DIR=".src/kernel-4.19"
KERNEL_419_DEFCONFIG="${KERNEL_419_DEFCONFIG:-vendor/whyred-perf_defconfig}"

# =============================================================================
# Resolved paths (depend on KERNEL_TRACK)
# =============================================================================
SRC_DIR=".src"
if [ "${KERNEL_TRACK}" = "4.19" ] || [ "${KERNEL_TRACK}" = "419" ]; then
  KERNEL_VERSION="4.19"
  KERNEL_SRC="${KERNEL_419_DIR}"
  BASE_DEFCONFIG="${KERNEL_419_DEFCONFIG}"
  ZIP_PREFIX="Whyred-4.19"
  LOCALVERSION="-whyred-419-${PROJECT_VERSION}"
else
  # Default and any other value → 6.18 mainline LTS
  KERNEL_TRACK="6.18"
  KERNEL_VERSION="6.18"
  KERNEL_SRC="${GKI_SRC}"
  BASE_DEFCONFIG="defconfig"
  ZIP_PREFIX="Phoenix-Whyred-6.18"
  LOCALVERSION="-phoenix-whyred-6.18-${PROJECT_VERSION}"
fi

OUT_DIR="out"
DIST_DIR="out/dist"
MODULES_OUT="out/modules"
BUILD_DIR="out/build"

# Config fragments (6.18 mainline)
FRAGMENT_SDM660="configs/fragments/sdm660.config"
FRAGMENT_WHYRED="configs/fragments/whyred.config"
FRAGMENT_LTS="configs/fragments/lts-6.18.config"

# Optional Android overlay (binder/cgroups/SELinux)
FRAGMENT_ANDROID="configs/fragments/android-gki.config"

# Device tree (project overlay → copied into mainline tree on setup)
DTS_DIR="arch/arm64/boot/dts/qcom"
DTB_NAME="sdm636-xiaomi-whyred"

# Build options
JOBS="$(nproc 2>/dev/null || echo 4)"
CC="clang"
LLVM="1"
LLVM_IAS="1"
CROSS_COMPILE="aarch64-linux-gnu-"

# Packing
ANYKERNEL_DIR="pack/AnyKernel3"
